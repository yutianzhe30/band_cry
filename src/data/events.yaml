      - type: has_flag
        flag: kuki_questioned_future
      - type: not_flag
        flag: kuki_ultimatum_done
      - type: week_check
        min: 22
  choices:
    - text: "「不管你做什么决定，我都支持你。」"
      result_text: "他沉默了很久。「谢谢你，真的。」那句话说得很认真，认真到你们都没再说话。分开时他拍了拍你的肩膀。"
      effects:
        - stat: sanity
          op: add
          value: 8
        - stat: intelligence
          op: add
          value: 3
      flags_add:
        - kuki_ultimatum_done
        - kuki_friend_to_end
    - text: "「乐队现在需要你，你不能就这样消失。」"
      result_text: "他皱了皱眉说「我知道」，然后换了话题。你感觉到他在后退，而你的话把他推得更远了一点。"
      effects:
        - stat: band_chemistry
          op: subtract
          value: 5
        - stat: sanity
          op: subtract
          value: 5
      flags_add:
        - kuki_ultimatum_done


