# ─── Kuki 冲突一：钱与尊严 ───────────────────────────────
- id: event_kuki_sponsorship
  visual: "kuki"
  oneTime: true
  description: "Kuki说，他父亲愿意赞助你们乐队一笔启动资金——设备、场地费、录音棚。条件只有一个：每次演出提一下他父亲公司的名字。Kuki看着你，眼神里有些期待，因为这样他也能向父亲交代。"
  trigger:
    and:
      - type: has_flag
        flag: kuki_appeared
      - type: not_flag
        flag: kuki_sponsor_done
      - type: week_check
        min: 8
  choices:
    - text: "「接受，钱是真实的，名字就一句话的事」"
      result_text: "Kuki松了口气，笑着说「好，我跟他说」。钱到账的那天你们买了新的踏板。但有个什么东西，好像就此被定价了。"
      effects:
        - stat: money
          op: add
          value: 3000
        - stat: artistic_integrity
          op: subtract
          value: 10
        - stat: band_chemistry
          op: add
          value: 3
      flags_add:
        - kuki_sponsor_done
        - kuki_dad_knows
    - text: "「谢谢，但我们自己来——不想欠这种人情」"
      result_text: "Kuki沉默了一下，说「好的」。你看到他有点失落，但他之后没再提过这件事。只是在某次排练后，他把你单独拉到一边说：「我觉得你做的是对的。」"
      effects:
        - stat: artistic_integrity
          op: add
          value: 8
        - stat: intelligence
          op: add
          value: 3
      flags_add:
        - kuki_sponsor_done

# ─── Kuki 冲突二：他开始动摇 ─────────────────────────────
- id: event_kuki_future_talk
  visual: "kuki"
  oneTime: true
  description: "Kuki发消息说想见你，见面后他喝着水，盯着桌子说，他父亲已经为他规划好了毕业后的路：回家接手公司某个部门，出国读MBA，然后按部就班往上走。「其实也还好，」他说，声音里没有什么信念。"
  trigger:
    and:
      - type: has_flag
        flag: kuki_appeared
      - type: not_flag
        flag: kuki_future_done
      - type: week_check
        min: 15
  choices:
    - text: "「你自己想怎样？」"
      result_text: "他愣了一下，好像这个问题没有人问过他。「我……」他没有说完，但那个停顿比任何答案都长。"
      effects:
        - stat: intelligence
          op: add
          value: 3
        - stat: sanity
          op: add
          value: 5
      flags_add:
        - kuki_future_done
        - kuki_questioned_future
    - text: "「听起来挺稳的，有什么不好的」"
      result_text: "他笑了笑说「是啊」，话题就结束了。之后他变得有点疏远，消息也回得少了。"
      effects:
        - stat: sanity
          op: subtract
          value: 3
      flags_add:
        - kuki_future_done

# ─── Kuki 冲突三：家族最后通牒 ────────────────────────────
- id: event_kuki_ultimatum
  visual: "kuki"
  oneTime: true
  description: "Kuki告诉你，他父亲发现了他把时间花在乐队上，打了一个很长的电话。他说他可能需要「暂停一段时间」，但语气里听不出他到底什么意思——是真的暂停，还是告别。"
  trigger:
