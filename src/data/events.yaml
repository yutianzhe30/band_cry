- id: event_music_critic_review
  oneTime: true
  description: "一个有影响力的乐评人看了你们的演出，并在他的专栏里写了一篇长文。他的评价……褒贬参半。"
  trigger:
    and:
      - type: stat_check
        stat: fame
        op: greater_than
        value: 32
      - type: has_flag
        flag: played_first_gig
      - type: probability
        chance: 0.38
  choices:
    - text: "认真阅读批评，从中学习"
      result_text: "他说你们的音乐「有真诚但缺技巧」。你把这句话贴在排练室的墙上。"
      effects:
        - stat: technique
          op: add
          value: 6
        - stat: artistic_integrity
          op: add
          value: 4
        - stat: fame
          op: add
          value: 8
    - text: "在社交媒体上反驳他"
      result_text: "这场口水战反而给你们带来了曝光度，但你在业内得罪了一些人。"
      effects:
        - stat: fame
          op: add
          value: 15
        - stat: charm
          op: subtract
          value: 5
        - stat: artistic_integrity
          op: subtract
          value: 3
