      result_text: "这场口水战反而给你们带来了曝光度，但你在业内得罪了一些人。"
      effects:
        - stat: fame
          op: add
          value: 15
        - stat: charm
          op: subtract
          value: 5
        - stat: artistic_integrity
          op: subtract
          value: 3


# ════════════════════════════════════════════════════════════
# 恋爱线：NaNa（贝斯手，乐队成员）
# ════════════════════════════════════════════════════════════

# ─── 转折时刻 ────────────────────────────────────────────
- id: event_nana_moment
  visual: "nana"
  oneTime: true
  description: "排练结束，大家陆续离开。你在收拾东西，NaNa还坐在那里拨弄贝斯，随手弹着什么，不像练习，更像自言自语。你发现自己没有马上离开的打算。"
  trigger:
    and:
      - type: week_check
        min: 5
      - type: not_flag
        flag: nana_romance_path
      - type: probability
        chance: 0.45
  choices:
    - text: "坐下来，问她在弹什么"
      result_text: "「没什么，就是一个音。」她抬头看了你一眼，然后重新低下头——但嘴角动了一下。"
      effects:
        - stat: affection
          op: add
          value: 18
        - stat: sanity
          op: add
          value: 5
      flags_add:
        - nana_romance_path
    - text: "跟她道了声晚安，出门了"
      result_text: "你走到门口，回头看了一眼，她还在弹。那个画面不知道为什么，在路上一直跟着你。"
      effects:
        - stat: affection
          op: add
          value: 5
      flags_add:
        - nana_romance_path

# ─── 两人单独出去 ─────────────────────────────────────────
- id: event_nana_hangout
  visual: "nana"
  oneTime: true
  description: "NaNa发来消息：「今晚有个乐队在地下室演，很小的场，没人知道。你来吗？」就你们两个，不是乐队活动，也没有什么特别的名义。"
  trigger:
    and:
      - type: has_flag
        flag: nana_romance_path
      - type: not_flag
        flag: nana_hangout
      - type: stat_check
        stat: affection
        op: greater_than
        value: 22
      - type: probability
        chance: 0.5
  choices:
    - text: "去"
      result_text: "那个地下室只能站三十个人，你们挤在角落里，音量大得说话要凑近耳边。她说了什么你没完全听清，但你点了头。"
      effects:
        - stat: affection
          op: add
          value: 20
        - stat: sanity
          op: add
          value: 8
      flags_add:
        - nana_hangout
    - text: "「今晚有事，下次吧」"
      result_text: "她回了「好」，之后没有再提。你不确定有没有下次。"
      effects:
        - stat: affection
          op: subtract
          value: 5
      flags_add:
        - nana_hangout

# ─── 深夜 ────────────────────────────────────────────────
- id: event_nana_night_jam
  visual: "nana"
  oneTime: true
  description: "凌晨一点，NaNa发来消息：「睡了吗。我在楼顶。带了琴，但弹的东西很乱。」"
  trigger:
    and:
      - type: has_flag
        flag: nana_hangout
      - type: not_flag
        flag: nana_night_jam
      - type: stat_check
        stat: affection
        op: greater_than
        value: 38
      - type: probability
        chance: 0.5
  choices:
    - text: "带上琴，上楼顶"
      result_text: "你们对弹到快三点，没有方向，没有主题。她说「这种感觉比排练好玩多了」。你没反驳。"
      effects:
        - stat: affection
          op: add
          value: 22
        - stat: artistic_integrity
          op: add
          value: 5
        - stat: sanity
          op: add
          value: 12
      flags_add:
        - nana_night_jam
    - text: "「太晚了，明天还要练」"
      result_text: "她回了个「哦」，你放下手机，盯着天花板很久没睡着。"
      effects:
        - stat: affection
          op: subtract
          value: 8
      flags_add:
        - nana_night_jam

# ─── 表白 ────────────────────────────────────────────────
- id: event_confess_nana
  visual: "nana"
  oneTime: true
  description: "排练前，只有你们两个人到了。她在调音，你坐在旁边，忽然觉得这种沉默有点难以为继。你知道自己在想什么，也知道说出来会改变很多事——包括乐队。"
  trigger:
    and:
      - type: has_flag
        flag: nana_night_jam
      - type: not_flag
        flag: confessed_nana
      - type: stat_check
        stat: affection
        op: greater_than
        value: 60
      - type: probability
        chance: 0.55
  choices:
    - text: "说出来"
      result_text: "她停下了调音，转过来看着你，表情你没见过。「你知道这很麻烦吧，」她说，然后笑了，「——但我也是。」"
      effects:
        - stat: affection
          op: add
          value: 25
        - stat: sanity
          op: add
          value: 15
        - stat: band_chemistry
          op: subtract
          value: 5
      flags_add:
        - confessed_nana
        - nana_accepted
    - text: "把那句话咽回去，说「没事，开始练吧」"
      result_text: "她看了你一秒，好像想问什么，然后重新调起了音。你们排练了两个小时，比平时都安静。"
      effects:
        - stat: affection
          op: add
          value: 3
        - stat: sanity
          op: subtract
          value: 8
      flags_add:
        - confessed_nana

# ─── 正式在一起 ──────────────────────────────────────────
- id: event_relationship_nana
  visual: "nana"
  oneTime: true
  description: "NaNa在排练后单独留下来问你：「那天之后你想好了吗，我们怎么处理这件事——乐队的事我是说，还有……我们的事。」她很少这么直接，但她现在是。"
  trigger:
    and:
      - type: has_flag
        flag: nana_accepted
      - type: not_flag
        flag: in_relationship
      - type: probability
        chance: 0.65
  choices:
    - text: "「在一起。乐队的事，我们边走边看。」"
      result_text: "她点了点头，说「好」，然后补了一句「你要是因为这个弹坏了就别怪我」。你笑了很久。"
      effects:
        - stat: affection
          op: add
          value: 18
        - stat: sanity
          op: add
          value: 20
        - stat: band_chemistry
          op: subtract
          value: 8
      flags_add:
        - in_relationship
    - text: "「我想在一起，但乐队优先——如果有冲突的话」"
      result_text: "她沉默了一下，说「那我也接受」。你们没有牵手，但某件事已经确定了。"
      effects:
        - stat: affection
          op: add
          value: 10
        - stat: band_chemistry
          op: add
          value: 5
      flags_add:
        - in_relationship


# ════════════════════════════════════════════════════════════
# 考试事件（每 ~9 周触发一次，共 3 次）
# 智力（intelligence）决定可选择的应对方式
# ════════════════════════════════════════════════════════════

# ─── 期中考 ───────────────────────────────────────────────
- id: event_exam_midterm
  oneTime: true
  description: "期中考试周到了。图书馆挤满了人，咖啡因和焦虑混成一种特殊的气味。你翻开复习资料，意识到这段时间投入了多少——或者多少没有投入。"
  trigger:
    and:
      - type: week_check
        min: 9
      - type: not_flag
        flag: exam_midterm_done
  choices:
    - text: "胸有成竹，正常发挥"
      requirements:
        - type: stat_check
          stat: intelligence
          op: greater_than_or_equal
          value: 55
      result_text: "你稳定发挥，成绩不错。考完走出教室，阳光晒得让人想发呆。"
      effects:
        - stat: sanity
          op: add
          value: 8
        - stat: charm
          op: add
          value: 3
      flags_add:
        - exam_midterm_done
    - text: "挣扎应对，凑合过关"
      result_text: "你拼命把脑子里的碎片知识拼凑成答案，写完最后一题时手已经在抖。不知道过没过。"
      effects:
        - stat: sanity
          op: subtract
          value: 10
        - stat: health
          op: subtract
          value: 5
      flags_add:
        - exam_midterm_done
    - text: "完全没复习，直接摆烂"
      requirements:
        - type: stat_check
          stat: intelligence
          op: less_than
          value: 35
      result_text: "你交了一半答案的试卷。系里发来了警告邮件，还要额外补考。"
      effects:
        - stat: sanity
          op: subtract
          value: 18
        - stat: money
          op: subtract
          value: 300
      flags_add:
        - exam_midterm_done

# ─── 期末考 ───────────────────────────────────────────────
- id: event_exam_final
  oneTime: true
  description: "期末了。这次考试比期中更重要——关系到能不能顺利升学。宿舍里的室友都在开夜车，窗外飘着热饮和疲惫的气息。"
  trigger:
    and:
      - type: week_check
        min: 18
      - type: has_flag
        flag: exam_midterm_done
      - type: not_flag
        flag: exam_final_done
  choices:
    - text: "全力以赴，争取高分"
      requirements:
        - type: stat_check
          stat: intelligence
          op: greater_than_or_equal
          value: 60
      result_text: "你连续三天只睡四个小时，但成绩单出来的时候，还是值得的。"
      effects:
        - stat: intelligence
          op: add
          value: 5
        - stat: sanity
          op: subtract
          value: 8
        - stat: health
          op: subtract
          value: 6
        - stat: money
          op: add
          value: 500
      flags_add:
        - exam_final_done
    - text: "稳扎稳打，求个及格"
      result_text: "你没有把睡眠压榨干净，考试也就那样。过了，但没什么好骄傲的。"
      effects:
        - stat: sanity
          op: subtract
          value: 12
        - stat: health
          op: subtract
          value: 4
      flags_add:
        - exam_final_done
    - text: "已经放弃了，只求别挂科"
      requirements:
        - type: stat_check
          stat: intelligence
          op: less_than
          value: 40
      result_text: "你挂了两科。补考费和羞耻感加在一起，比任何事都贵。"
      effects:
        - stat: sanity
          op: subtract
          value: 25
        - stat: money
          op: subtract
          value: 800
        - stat: artistic_integrity
          op: subtract
          value: 5
      flags_add:
        - exam_final_done

# ─── 下学期期末考 ─────────────────────────────────────────
- id: event_exam_second_final
  oneTime: true
  description: "又是一年期末。你已经经历过一次了，知道这种时候是什么滋味——但知道归知道，该来的还是来了。"
  trigger:
    and:
      - type: week_check
        min: 27
      - type: has_flag
        flag: exam_final_done
      - type: not_flag
        flag: exam_second_final_done
  choices:
    - text: "老手了，从容应对"
      requirements:
        - type: stat_check
          stat: intelligence
          op: greater_than_or_equal
          value: 65
      result_text: "你把备考时间压缩到刚刚好，剩下的时间还是给了音乐。两件事都没有垮。"
      effects:
        - stat: sanity
          op: add
          value: 5
        - stat: technique
          op: add
          value: 3
        - stat: money
          op: add
          value: 600
      flags_add:
        - exam_second_final_done
    - text: "硬撑过去"
      result_text: "你用意志力把自己钉在书桌前。考完之后倒头就睡了十四个小时。"
      effects:
        - stat: sanity
          op: subtract
          value: 15
        - stat: health
          op: subtract
          value: 8
      flags_add:
        - exam_second_final_done
    - text: "这次真的崩了，什么都顾不上"
      requirements:
        - type: stat_check
          stat: intelligence
          op: less_than
          value: 38
      result_text: "挂科、补考、家长电话。你坐在学校台阶上，不知道接下来怎么办。"
      effects:
        - stat: sanity
          op: subtract
          value: 30
        - stat: money
          op: subtract
          value: 1200
        - stat: band_chemistry
          op: subtract
          value: 10
      flags_add:
        - exam_second_final_done


# ════════════════════════════════════════════════════════════
# 主线：第一幕——入学与组队（强制触发，按顺序解锁）
# ════════════════════════════════════════════════════════════

# ─── 遇见 NaNa ───────────────────────────────────────────
- id: event_meet_nana
  visual: "nana"
  oneTime: true
  description: "排练室的门是虚掩的。你推开它，里面只有一个女生，正坐在放大器上拨弄贝斯，随手弹着一段你没听过的东西，不像练习，更像是在跟自己说话。她抬头看了你一眼——「找谁？」"
  trigger:
    and:
      - type: week_check
        min: 1
      - type: not_flag
        flag: nana_met
  choices:
    - text: "「我想组个乐队，你感兴趣吗？」"
      result_text: "她放下了贝斯，打量了你几秒，然后说：「还挺直接的。」顿了一下，「行，我在。」"
      effects:
        - stat: affection
          op: add
          value: 12
        - stat: band_chemistry
          op: add
          value: 8
      flags_add:
        - nana_met
    - text: "「这里是排练室吗？我刚来，想找个地方练一练。」"
      result_text: "「是啊，」她说，「你弹什么的？」你们聊了半小时，到最后她说：「有机会可以一起玩。」"
      effects:
        - stat: affection
          op: add
          value: 6
        - stat: technique
          op: add
          value: 3
      flags_add:
        - nana_met

# ─── 乐队正式组建 ─────────────────────────────────────────
- id: event_form_band
  visual: "nana"
  oneTime: true
  description: "经过几周的联系和试音，你们终于有了一支像样的阵容——贝斯（NaNa）、鼓手、键盘，加上你。第一次全员到齐的排练，排练室里人多了，味道也不一样了。"
  trigger:
    and:
      - type: week_check
        min: 2
      - type: has_flag
        flag: nana_met
      - type: not_flag
        flag: band_formed
  choices:
    - text: "认真主持，从基础排练开始"
      result_text: "你们从节拍器一拍一拍地对起来。很慢，很枯燥，但到最后合上的那一刻，每个人都沉默了一秒。"
      effects:
        - stat: technique
          op: add
          value: 5
        - stat: band_chemistry
          op: add
          value: 10
      flags_add:
        - band_formed
    - text: "「别管那么多，先玩起来再说」"
      result_text: "乱成了一团，但有一种奇怪的快乐。NaNa笑着说「这个我喜欢」。"
      effects:
        - stat: affection
          op: add
          value: 10
        - stat: band_chemistry
          op: add
          value: 6
        - stat: sanity
          op: add
          value: 8
      flags_add:
        - band_formed

# ─── Kuki 出现 ────────────────────────────────────────────
- id: event_kuki_shows_up
  visual: "kuki"
  oneTime: true
  description: "排练结束后，你在走廊碰到了一个熟悉的脸——Kuki，你的老朋友。他手里提着两袋零食，说自己是「路过」，但显然在这里等了一会儿。「你们在排练？」他问，「听起来还不错。」"
  trigger:
    and:
      - type: week_check
        min: 3
      - type: has_flag
        flag: band_formed
      - type: not_flag
        flag: kuki_appeared
  choices:
    - text: "拉他进来，介绍给大家"
      result_text: "他有点拘谨，但笑得很真诚。NaNa说「你朋友挺有钱的感觉」，他当没听见，把零食分给了所有人。"
      effects:
        - stat: sanity
          op: add
          value: 8
        - stat: band_chemistry
          op: add
          value: 5
      flags_add:
        - kuki_appeared
    - text: "「你有兴趣一起玩吗？」"
      result_text: "他想了想说「我没有乐器」，你说「可以买」，他笑了。他最后没加入，但成了乐队固定的观众和后勤。"
      effects:
        - stat: intelligence
          op: add
          value: 3
        - stat: money
          op: add
          value: 200
      flags_add:
        - kuki_appeared


# ════════════════════════════════════════════════════════════
# NaNa 人物线
# ════════════════════════════════════════════════════════════

# ─── NaNa 偷懒 ───────────────────────────────────────────
- id: event_nana_slacking
  visual: "nana"
  cooldown: 8
  description: "今天的排练，NaNa明显没有好好准备。她的部分走音了两次，被问起来只是耸耸肩说「最近状态不好」。其他成员的眼神在你和她之间飘来飘去，等你表个态。"
  trigger:
    and:
      - type: has_flag
        flag: nana_met
      - type: not_flag
        flag: nana_left_band
      - type: not_flag
        flag: nana_truce
      - type: week_check
        min: 9
      - type: probability
        chance: 0.5
  choices:
    - text: "当场指出来，这不是应有的态度"
      result_text: "她没有顶嘴，低着头把那段重弹了两遍，第二遍没出问题。排练室的气氛压了很久。"
      effects:
        - stat: technique
          op: add
          value: 4
        - stat: band_chemistry
          op: add
          value: 8
        - stat: affection
          op: subtract
          value: 10
    - text: "排练后私下问她是不是有什么事"
      result_text: "她说了些模糊的话，「就是最近脑子转不动」。你没追问，她反而有点感激地看了你一眼。"
      effects:
        - stat: affection
          op: add
          value: 8
        - stat: band_chemistry
          op: subtract
          value: 5

# ─── NaNa 提议写歌 ────────────────────────────────────────
- id: event_nana_write_song
  visual: "nana"
  oneTime: true
  description: "一个下午，排练室只有你们两个人。NaNa突然把贝斯竖起来，说：「我们来写一首歌吧，就现在，随便写，写什么都行。」她的眼神里有那种少见的认真。"
  trigger:
    and:
      - type: has_flag
        flag: nana_met
      - type: not_flag
        flag: nana_left_band
      - type: not_flag
        flag: nana_write_song_done
      - type: week_check
        min: 10
      - type: probability
        chance: 0.5
  choices:
    - text: "「好，跟着感觉走，写什么都行」"
      result_text: "你们花了整个下午乱弹，什么都没定下来，但有一段旋律你怎么都忘不掉。NaNa说「这才是音乐的本来面目」。"
      effects:
        - stat: affection
          op: add
          value: 15
        - stat: artistic_integrity
          op: add
          value: 12
        - stat: sanity
          op: add
          value: 8
      flags_add:
        - nana_write_song_done
    - text: "「先定好结构，这样效率高一点」"
      result_text: "你画了一张表，AB段分好，和弦进行写清楚。NaNa配合着，但你能感觉到她的热情在一点点冷下去。歌写完了，很完整，但不知道为什么，有点空。"
      effects:
        - stat: technique
          op: add
          value: 8
        - stat: affection
          op: subtract
          value: 3
        - stat: artistic_integrity
          op: subtract
          value: 3
      flags_add:
        - nana_write_song_done

# ─── NaNa 消失三天 ───────────────────────────────────────
- id: event_nana_vanishes
  visual: "nana"
  oneTime: true
  description: "NaNa消失了三天。电话不接，消息不回，连排练她都没来。第四天她突然出现，背着包，头发被风吹乱了，说「去了趟海边，想清楚了一些事」。她没有解释更多。"
  trigger:
    and:
      - type: has_flag
        flag: nana_met
      - type: not_flag
        flag: nana_left_band
      - type: not_flag
        flag: nana_vanish_done
      - type: week_check
        min: 12
      - type: probability
        chance: 0.6
  choices:
    - text: "「想清楚了什么？」"
      result_text: "她笑笑，「一些事。」没有说清楚，但她把手机放在了桌上，推到你面前——屏幕上有一段写了一半的歌词。"
      effects:
        - stat: affection
          op: add
          value: 10
        - stat: artistic_integrity
          op: add
          value: 5
      flags_add:
        - nana_vanish_done
    - text: "「回来就好，接着排练吧」"
      result_text: "她愣了一下，然后点了点头。「你不会问我去哪儿了？」「你不是回来了吗。」她沉默了一会儿，抱起贝斯。"
      effects:
        - stat: affection
          op: add
          value: 8
        - stat: band_chemistry
          op: add
          value: 6
      flags_add:
        - nana_vanish_done

# ─── NaNa 去留：好感路线（Version A）────────────────────
- id: event_nana_decision_a
  visual: "nana"
  oneTime: true
